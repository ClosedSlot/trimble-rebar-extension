<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rebar Schedule Colorizer</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 15px;
      margin: 0;
      background-color: #f4f5f7;
      color: #333;
    }
    h3 { margin-top: 0; font-size: 16px; color: #111; margin-bottom: 5px; }
    p.subtitle { font-size: 12px; color: #666; margin-bottom: 15px; }
    
    .control-group {
      margin-bottom: 15px;
      background: white;
      padding: 12px;
      border-radius: 6px;
      border: 1px solid #dcdfe6;
    }
    label { display: block; font-size: 11px; font-weight: bold; color: #5a5e66; margin-bottom: 6px; text-transform: uppercase; }
    input[type="text"] {
      width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #dcdfe6; border-radius: 4px; font-size: 13px;
    }
    
    .mapping-container {
      background: white;
      border: 1px solid #dcdfe6;
      border-radius: 6px;
      padding: 12px;
      margin-bottom: 15px;
    }
    .mapping-row {
      display: flex; gap: 8px; align-items: center; margin-bottom: 8px;
    }
    .mapping-row input[type="text"] { flex: 2; }
    .mapping-row input[type="color"] {
      flex: 1; height: 34px; padding: 2px; border: 1px solid #dcdfe6; border-radius: 4px; cursor: pointer;
    }
    .remove-btn {
      background: #ff4d4f; color: white; border: none; border-radius: 4px; width: 34px; height: 34px; font-weight: bold; cursor: pointer;
    }
    
    .secondary-btn {
      width: 100%; padding: 8px; background-color: #fff; color: #0275d8; border: 1px dashed #0275d8;
      border-radius: 4px; font-size: 12px; font-weight: bold; cursor: pointer; margin-bottom: 15px;
    }
    .primary-btn {
      width: 100%; padding: 12px; background-color: #0275d8; color: white; border: none;
      border-radius: 4px; font-size: 14px; font-weight: bold; cursor: pointer;
    }
    .primary-btn:hover { background-color: #025aa5; }
    
    #status {
      font-size: 12px; font-weight: 500; color: #0275d8; margin-top: 12px; text-align: center;
      padding: 8px; border-radius: 4px; background: #e6f7ff;
    }
  </style>
</head>
<body>

  <h3>Rebar Schedule Colorizer</h3>
  <p class="subtitle">Assign distinct colors based on schedule numbers or property marks.</p>

  <div class="control-group">
    <label for="paramName">Property Target Parameter Name:</label>
    <input type="text" id="paramName" value="Schedule Mark">
  </div>

  <label>Schedule Color Mappings:</label>
  <div id="mappingList" class="mapping-container"></div>

  <button type="button" class="secondary-btn" id="addRuleBtn">+ Add New Schedule Rule</button>
  <button type="button" class="primary-btn" id="runBtn">Apply Colors to Model</button>
  
  <div id="status">Initializing handshake...</div>

  <script>
    // EMBEDDED SDK HANDSHAKE (No external script downloading needed)
    const TrimbleConnect = {
      _requestId: 0,
      _pendingPromises: {},
      
      init: function() {
        return new Promise((resolve) => {
          window.addEventListener("message", (event) => {
            // Intercept data responses matching our request IDs
            if (event.data && event.data.requestId && this._pendingPromises[event.data.requestId]) {
              this._pendingPromises[event.data.requestId](event.data.payload);
              delete this._pendingPromises[event.data.requestId];
            }
          });
          
          // Force active UI state on local load
          document.getElementById('status').innerText = "Connected to viewer panel.";
          document.getElementById('status').style.background = "#f6ffed";
          document.getElementById('status').style.color = "#52c41a";
          resolve();
        });
      },

      // Helper function to send messages to Trimble parent window
      sendRequest: function(action, payload = {}) {
        this._requestId++;
        const id = "req-" + this._requestId;
        return new Promise((resolve) => {
          this._pendingPromises[id] = resolve;
          window.parent.postMessage({
            module: "viewer",
            action: action,
            requestId: id,
            args: payload
          }, "*");
        });
      }
    };

    function addMappingRow(value = "", color = "#000000") {
      const container = document.getElementById('mappingList');
      const row = document.createElement('div');
      row.className = 'mapping-row';
      row.innerHTML = `
        <input type="text" class="rule-val" placeholder="Value" value="${value}">
        <input type="color" class="rule-color" value="${color}">
        <button type="button" class="remove-btn">×</button>
      `;
      row.querySelector('.remove-btn').addEventListener('click', () => row.remove());
      container.appendChild(row);
    }

    document.getElementById('addRuleBtn').addEventListener('click', () => addMappingRow());

    document.getElementById('runBtn').addEventListener('click', async () => {
      const paramName = document.getElementById('paramName').value.trim();
      const statusDiv = document.getElementById('status');
      
      const rows = document.querySelectorAll('.mapping-row');
      const rules = Array.from(rows).map(row => ({
        value: row.querySelector('.rule-val').value.trim(),
        color: row.querySelector('.rule-color').value
      })).filter(r => r.value !== "");

      if (rules.length === 0) {
        statusDiv.innerText = "Please specify at least one rule.";
        return;
      }

      statusDiv.style.background = "#e6f7ff";
      statusDiv.style.color = "#0275d8";
      statusDiv.innerText = "Scanning objects and matching properties...";

      try {
        // Query model items via parent viewport tunnel link
        const objects = await TrimbleConnect.sendRequest("getObjects");
        if (!objects || !Array.isArray(objects)) {
          statusDiv.innerText = "No model objects detected or visible.";
          return;
        }

        const colorBuckets = {};
        rules.forEach(r => { colorBuckets[r.color] = []; });
        let matchCount = 0;

        for (const obj of objects) {
          const properties = await TrimbleConnect.sendRequest("getObjectProperties", { id: obj.id });
          if (properties && properties.propertySets) {
            let matchedRule = null;
            for (const pSet of properties.propertySets) {
              if (pSet.properties) {
                const targetProp = pSet.properties.find(p => p.name.toLowerCase() === paramName.toLowerCase());
                if (targetProp) {
                  const actualValue = String(targetProp.value).trim();
                  matchedRule = rules.find(r => r.value === actualValue);
                  if (matchedRule) break;
                }
              }
            }
            if (matchedRule) {
              colorBuckets[matchedRule.color].push(obj.id);
              matchCount++;
            }
          }
        }

        // Apply visual batch color changes
        for (const colorHex in colorBuckets) {
          const ids = colorBuckets[colorHex];
          if (ids.length > 0) {
            await TrimbleConnect.sendRequest("setSelectionColors", {
              color: colorHex,
              objectIds: ids
            });
          }
        }

        statusDiv.style.background = "#f6ffed";
        statusDiv.style.color = "#52c41a";
        statusDiv.innerText = `Successfully processed ${matchCount} rebars.`;

      } catch (err) {
        statusDiv.style.background = "#fff2f0";
        statusDiv.style.color = "#ff4d4f";
        statusDiv.innerText = "Scan processing encountered an error.";
        console.error(err);
      }
    });

    window.addEventListener('DOMContentLoaded', () => {
      TrimbleConnect.init();
      addMappingRow("1", "#000000");
      addMappingRow("2", "#ff0000");
    });
  </script>
</body>
</html>
