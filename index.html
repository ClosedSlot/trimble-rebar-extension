<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<title>Rebar Color by Schedule Mark</title>
<script src="https://components.connect.trimble.com/trimble-connect-workspace-api/index.js"></script>
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 13px;
    color: #222;
    padding: 14px;
  }
  h3 { margin: 0 0 10px 0; font-size: 14px; }
  .legend { display: flex; gap: 14px; margin: 10px 0 14px 0; flex-wrap: wrap; }
  .legend div { display: flex; align-items: center; gap: 5px; }
  .swatch {
    display: inline-block;
    width: 12px; height: 12px;
    border-radius: 2px;
    border: 1px solid #999;
  }
  button {
    padding: 7px 14px;
    margin-right: 8px;
    margin-top: 4px;
    cursor: pointer;
    border: 1px solid #ccc;
    border-radius: 4px;
    background: #f5f5f5;
  }
  button:hover { background: #ebebeb; }
  button:disabled { opacity: 0.5; cursor: default; }
  #status {
    margin-top: 12px;
    color: #555;
    white-space: pre-line;
    min-height: 1.2em;
  }
</style>
</head>
<body>
  <h3>Rebar coloring by "Schedule Mark"</h3>

  <div class="legend">
    <div><span class="swatch" style="background:#000000"></span>1 = Black</div>
    <div><span class="swatch" style="background:#e53935"></span>2 = Red</div>
    <div><span class="swatch" style="background:#43a047"></span>3 = Green</div>
    <div><span class="swatch" style="background:#1e88e5"></span>4 = Blue</div>
  </div>

  <button id="runBtn">Color rebars</button>
  <button id="resetBtn">Reset colors</button>
  <div id="status"></div>

<script>
// ---------------------------------------------------------------------
// Configuration
// ---------------------------------------------------------------------

// The exact property name to read. Matching is case-insensitive.
const PROPERTY_NAME = "Schedule Mark";

// Optional: restrict scanning to a specific object class for speed on
// large models, e.g. "IFCREINFORCINGBAR". Leave "" to scan every object
// (safe default, since only rebar will actually carry a Schedule Mark).
const CLASS_FILTER = "";

// Batch size for getObjectProperties calls (keeps payloads reasonable).
const CHUNK_SIZE = 300;

// Schedule Mark value -> RGBA color (0-255 per channel).
const COLOR_MAP = {
  "1": { r: 0,   g: 0,   b: 0,   a: 255 }, // Black
  "2": { r: 229, g: 57,  b: 53,  a: 255 }, // Red
  "3": { r: 67,  g: 160, b: 71,  a: 255 }, // Green
  "4": { r: 30,  g: 136, b: 229, a: 255 }, // Blue
};

// ---------------------------------------------------------------------

let API;
const statusEl = document.getElementById("status");
const runBtn = document.getElementById("runBtn");
const resetBtn = document.getElementById("resetBtn");

function log(msg) {
  statusEl.textContent = msg;
  console.log(msg);
}

async function init() {
  try {
    API = await TrimbleConnectWorkspace.connect(window.parent, (event, data) => {
      // Handle extension.command / accessToken events here if needed later.
    });
    log("Connected. Ready.");
  } catch (err) {
    log("Failed to connect to Trimble Connect: " + err.message);
  }
}

function chunkArray(arr, size) {
  const out = [];
  for (let i = 0; i < arr.length; i += size) out.push(arr.slice(i, i + size));
  return out;
}

// Looks through every property set on an object for a property whose
// name matches PROPERTY_NAME (case-insensitive) and returns its value.
function findScheduleMark(objectProperties) {
  const sets = objectProperties.properties || [];
  for (const set of sets) {
    const props = set.properties || [];
    for (const p of props) {
      if (p.name && p.name.trim().toLowerCase() === PROPERTY_NAME.toLowerCase()) {
        return String(p.value).trim();
      }
    }
  }
  return null;
}

async function colorRebars() {
  runBtn.disabled = true;
  try {
    const models = await API.viewer.getModels("loaded");
    if (!models.length) {
      log("No loaded models found. Load a model in the viewer first.");
      return;
    }

    let totalColored = 0;
    let totalScanned = 0;

    for (const model of models) {
      log(`Scanning "${model.name || model.id}"...`);

      const selector = { modelObjectIds: [{ modelId: model.id }] };
      if (CLASS_FILTER) selector.parameter = { class: CLASS_FILTER };

      const objectsRes = await API.viewer.getObjects(selector);
      const modelEntry = objectsRes.find((o) => o.modelId === model.id);
      if (!modelEntry || !modelEntry.objects.length) continue;

      const runtimeIds = modelEntry.objects.map((o) => o.id);
      totalScanned += runtimeIds.length;

      const groups = { "1": [], "2": [], "3": [], "4": [] };

      for (const idBatch of chunkArray(runtimeIds, CHUNK_SIZE)) {
        const propsRes = await API.viewer.getObjectProperties(model.id, idBatch);
        for (const obj of propsRes) {
          const mark = findScheduleMark(obj);
          if (mark && groups[mark]) groups[mark].push(obj.id);
        }
      }

      for (const mark of Object.keys(groups)) {
        const ids = groups[mark];
        if (!ids.length) continue;
        await API.viewer.setObjectState(
          { modelObjectIds: [{ modelId: model.id, objectRuntimeIds: ids }] },
          { color: COLOR_MAP[mark] }
        );
        totalColored += ids.length;
      }
    }

    log(`Done. Scanned ${totalScanned} object(s), colored ${totalColored} rebar object(s) with a Schedule Mark of 1-4.`);
  } catch (err) {
    console.error(err);
    log("Error: " + err.message);
  } finally {
    runBtn.disabled = false;
  }
}

async function resetColors() {
  resetBtn.disabled = true;
  try {
    log("Resetting colors...");
    const colored = await API.viewer.getColoredObjects();
    for (const entry of colored) {
      if (!entry.objects.length) continue;
      await API.viewer.setObjectState(
        {
          modelObjectIds: [
            { modelId: entry.modelId, objectRuntimeIds: entry.objects.map((o) => o.id) },
          ],
        },
        { color: "reset" }
      );
    }
    log("Colors reset.");
  } catch (err) {
    console.error(err);
    log("Error: " + err.message);
  } finally {
    resetBtn.disabled = false;
  }
}

runBtn.addEventListener("click", colorRebars);
resetBtn.addEventListener("click", resetColors);

init();
</script>
</body>
</html>
